<style>
  :host {
    --primary: #f97316;
    --primary-light: #fed7aa;
    --dark: #1c1917;
    --gray: #78716c;
    --light: #fafaf9;

    font-family:
      'Inter',
      -apple-system,
      BlinkMacSystemFont,
      'Segoe UI',
      Roboto,
      Helvetica,
      Arial,
      sans-serif;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  main {
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: var(--light);
    padding: 2rem;
    box-sizing: border-box;
    text-align: center;
  }

  .icon {
    font-size: 4rem;
    margin-bottom: 1.5rem;
    animation: swing 2s ease-in-out infinite;
  }

  h1 {
    font-size: 2.5rem;
    color: var(--dark);
    font-weight: 700;
    margin: 0 0 0.5rem;
    letter-spacing: -0.05rem;
  }

  .subtitle {
    font-size: 1.25rem;
    color: var(--gray);
    margin: 0 0 2rem;
  }

  .bar-container {
    width: 100%;
    max-width: 320px;
    height: 6px;
    background: var(--primary-light);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 2rem;
  }

  .bar {
    width: 40%;
    height: 100%;
    background: var(--primary);
    border-radius: 3px;
    animation: loading 2s ease-in-out infinite;
  }

  .message {
    font-size: 0.95rem;
    color: var(--gray);
    margin: 0;
  }

  @keyframes loading {
    0% {
      transform: translateX(-100%);
    }
    50% {
      transform: translateX(250%);
    }
    100% {
      transform: translateX(-100%);
    }
  }

  @keyframes swing {
    0%,
    100% {
      transform: rotate(-10deg);
    }
    50% {
      transform: rotate(10deg);
    }
  }

  @media screen and (max-width: 480px) {
    h1 {
      font-size: 1.75rem;
    }

    .subtitle {
      font-size: 1rem;
    }
  }
</style>

<main>
  <div class="icon">&#x1F6A7;</div>
  <h1>{{ title() }}</h1>
  <p class="subtitle">Site en construction</p>
  <div class="bar-container">
    <div class="bar"></div>
  </div>
  <p class="message">C'est presque prêt, mais pas encore. Revenez bientôt !</p>
</main>
